<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 貼圖咒語產生器 - 平衡版</title>
<style>
:root {
  --primary: #0071e3;
  --bg: #f5f5f7;
  --surface: #ffffff;
  --text: #1d1d1f;
  --text-muted: #6e6e73;
  --border: #d2d2d7;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}
.container { max-width: 900px; margin: 0 auto; }
.header {
  text-align: center;
  margin-bottom: 40px;
  padding: 40px 20px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: var(--radius);
  color: white;
}
.header h1 { font-size: 32px; margin-bottom: 10px; }
.section {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 30px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.section-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
.form-group { margin-bottom: 25px; }
.form-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.preset-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}
.preset-card {
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 15px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
}
.preset-card:hover { border-color: var(--primary); }
.preset-card.selected {
  border-color: var(--primary);
  background: rgba(0, 113, 227, 0.05);
}
.preset-icon { font-size: 32px; margin-bottom: 8px; }
.input-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}
select, input, textarea {
  width: 100%;
  padding: 12px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
}
textarea { resize: vertical; min-height: 120px; }
.btn-primary {
  background: var(--primary);
  color: white;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 20px;
}
.result-box {
  background: #1e1e1e;
  color: #d4d4d4;
  padding: 20px;
  border-radius: var(--radius);
  font-family: Consolas, monospace;
  font-size: 13px;
  white-space: pre-wrap;
  max-height: 500px;
  overflow-y: auto;
  margin-bottom: 20px;
}
.hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎨 LINE 貼圖咒語產生器</h1>
    <p>平衡版 - 保留核心功能</p>
  </div>

  <div class="section">
    <div class="section-title">👤 步驟 1：人物設定</div>

    <div class="form-group">
      <label class="form-label">選擇設定方式</label>
      <div class="preset-grid">
        <div class="preset-card" onclick="selectMode('upload')">
          <div class="preset-icon">📸</div>
          <div>上傳照片</div>
        </div>
        <div class="preset-card" onclick="selectMode('preset')">
          <div class="preset-icon">⚡</div>
          <div>快速套餐</div>
        </div>
        <div class="preset-card" onclick="selectMode('manual')">
          <div class="preset-icon">✏️</div>
          <div>手動設定</div>
        </div>
      </div>
    </div>

    <div id="uploadPanel" class="hidden">
      <div class="form-group">
        <label class="form-label">上傳人物照片</label>
        <input type="file" id="photoUpload" accept="image/*" style="width: 100%; padding: 12px; border: 2px dashed var(--border); border-radius: 8px; cursor: pointer;">
        <div id="uploadPreview" class="hidden" style="margin-top: 15px; text-align: center;">
          <img id="previewImg" style="max-width: 200px; border-radius: 8px; box-shadow: var(--shadow);">
          <p style="margin-top: 10px; font-size: 14px; color: var(--text-muted);">照片已上傳，系統會根據照片生成描述</p>
        </div>
      </div>
    </div>

    <div id="presetPanel" class="hidden">
      <div class="form-group">
        <label class="form-label">快速套餐</label>
        <div class="preset-grid">
          <div class="preset-card" onclick="selectPreset('girl')">
            <div class="preset-icon">👧</div>
            <div>日常女孩</div>
          </div>
          <div class="preset-card" onclick="selectPreset('man')">
            <div class="preset-icon">👨‍💼</div>
            <div>職場男性</div>
          </div>
          <div class="preset-card" onclick="selectPreset('pet')">
            <div class="preset-icon">🐱</div>
            <div>可愛寵物</div>
          </div>
        </div>
      </div>
    </div>

    <div id="manualPanel" class="hidden">
      <div class="form-group">
        <label class="form-label">外觀特徵</label>
      <div class="input-grid">
        <select id="face">
          <option>圓臉</option>
          <option>瓜子臉</option>
          <option>鵝蛋臉</option>
        </select>
        <select id="eyes">
          <option>大眼睛</option>
          <option>瞇瞇眼</option>
          <option>杏眼</option>
        </select>
        <select id="hair">
          <option>長直髮</option>
          <option>短髮</option>
          <option>捲髮</option>
        </select>
        <select id="hairColor">
          <option>黑色</option>
          <option>棕色</option>
          <option>金色</option>
        </select>
      </div>
    </div>
      <div class="form-group">
        <label class="form-label">服裝設定</label>
        <div class="input-grid">
          <select id="clothing">
            <option>休閒服</option>
            <option>西裝</option>
            <option>洋裝</option>
          </select>
          <input type="text" id="accessories" placeholder="配件（選填）">
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🎨 步驟 2：風格設定</div>
    <div class="input-grid">
      <div class="form-group">
        <label class="form-label">畫風</label>
        <select id="style">
          <option value="cute">可愛 Q 版</option>
          <option value="realistic">寫實風格</option>
          <option value="ink">水墨手繪</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">文字樣式</label>
        <select id="font">
          <option value="bold">粗黑體</option>
          <option value="handwriting">手寫體</option>
          <option value="cute">可愛字體</option>
        </select>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">💬 步驟 3：文字腳本</div>
    <div class="form-group">
      <label class="form-label">選擇腳本包（40 個腳本包）</label>
      <div style="margin-bottom: 15px;">
        <button class="btn-primary" onclick="randomScript()" style="width: auto; padding: 10px 20px; font-size: 14px;">🎲 隨機選擇腳本</button>
      </div>
      <div class="preset-grid" id="scriptPacks"></div>
    </div>
    <div class="form-group">
      <label class="form-label">或自訂文字（每行一句，共 16 句）</label>
      <textarea id="customText" placeholder="早安&#10;晚安&#10;謝謝&#10;..."></textarea>
    </div>
  </div>

  <button class="btn-primary" onclick="generatePrompt()">🚀 生成咒語</button>

  <div class="section hidden" id="resultSection">
    <div class="section-title">✅ 你的咒語</div>
    <div class="result-box" id="resultBox"></div>
    <button class="btn-primary" onclick="copyPrompt()">📋 複製咒語</button>
  </div>
</div>

function selectMode(mode) {
  currentMode = mode;

  // 清除所有模式卡片的選中狀態
  document.querySelectorAll('.preset-card').forEach(c => c.classList.remove('selected'));
  event.target.closest('.preset-card').classList.add('selected');

  // 隱藏所有面板
  document.getElementById('uploadPanel').classList.add('hidden');
  document.getElementById('presetPanel').classList.add('hidden');
  document.getElementById('manualPanel').classList.add('hidden');

  // 顯示對應面板
  if (mode === 'upload') {
    document.getElementById('uploadPanel').classList.remove('hidden');
  } else if (mode === 'preset') {
    document.getElementById('presetPanel').classList.remove('hidden');
  } else if (mode === 'manual') {
    document.getElementById('manualPanel').classList.remove('hidden');
  }
}

// 處理照片上傳
document.addEventListener('DOMContentLoaded', function() {
  const photoInput = document.getElementById('photoUpload');
  if (photoInput) {
    photoInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          uploadedPhoto = e.target.result;
          document.getElementById('previewImg').src = e.target.result;
          document.getElementById('uploadPreview').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    });
  }
});

function renderScriptPacks() {
  document.getElementById('scriptPacks').innerHTML = scriptPacks.map(p =>
    `<div class="preset-card" onclick="selectScriptPack('${p.id}')">
      <div style="font-weight: 600; margin-bottom: 5px;">${p.name}</div>
      <div style="font-size: 12px; color: var(--text-muted);">${p.description}</div>
    </div>`
  ).join('');
}

function selectScriptPack(id) {
  document.querySelectorAll('#scriptPacks .preset-card').forEach(c => c.classList.remove('selected'));
  event.target.closest('.preset-card').classList.add('selected');
  const pack = scriptPacks.find(p => p.id === id);
  document.getElementById('customText').value = pack.lines.join('\n');
}

function randomScript() {
  const randomPack = scriptPacks[Math.floor(Math.random() * scriptPacks.length)];
  document.querySelectorAll('#scriptPacks .preset-card').forEach(c => c.classList.remove('selected'));
  const cards = document.querySelectorAll('#scriptPacks .preset-card');
  const targetCard = Array.from(cards).find(card => card.textContent.includes(randomPack.name));
  if (targetCard) {
    targetCard.classList.add('selected');
    targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  document.getElementById('customText').value = randomPack.lines.join('\n');
  alert('🎲 已隨機選擇：' + randomPack.name);
}

function selectPreset(type) {
  document.querySelectorAll('#presetPanel .preset-card').forEach(c => c.classList.remove('selected'));
  event.target.closest('.preset-card').classList.add('selected');
  const presets = {
    girl: { face: 0, eyes: 0, hair: 0, hairColor: 0, clothing: 0 },
    man: { face: 1, eyes: 2, hair: 1, hairColor: 0, clothing: 1 },
    pet: { face: 0, eyes: 0, hair: 1, hairColor: 1, clothing: 0 }
  };
  const p = presets[type];
  document.getElementById('face').selectedIndex = p.face;
  document.getElementById('eyes').selectedIndex = p.eyes;
  document.getElementById('hair').selectedIndex = p.hair;
  document.getElementById('hairColor').selectedIndex = p.hairColor;
  document.getElementById('clothing').selectedIndex = p.clothing;
}

function generatePrompt() {
  const text = document.getElementById('customText').value.trim();
  if (!text) { alert('請選擇腳本包或輸入文字'); return; }
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length !== 16) { alert('需要 16 句文字（目前：' + lines.length + '）'); return; }

  const styleMap = {
    cute: 'Q 版可愛風格，大眼睛，圓潤身形',
    realistic: '寫實風格，自然比例，細緻五官',
    ink: '水墨手繪風格，手繪塗鴉質感'
  };
  const fontMap = {
    bold: '粗黑體，清晰易讀',
    handwriting: '手寫體，自然筆觸',
    cute: '可愛字體，圓潤筆畫'
  };

  let char = '';
  if (currentMode === 'upload' && uploadedPhoto) {
    char = '根據上傳的照片，保持角色的主要特徵（臉型、髮型、服裝風格等）';
  } else {
    char = `${document.getElementById('face').value}、${document.getElementById('eyes').value}、${document.getElementById('hair').value}、${document.getElementById('hairColor').value}頭髮、穿著${document.getElementById('clothing').value}${document.getElementById('accessories').value ? '、' + document.getElementById('accessories').value : ''}`;
  }

  const prompt = `## LINE 貼圖生成咒語

### 角色設定
${char}

### 畫風
${styleMap[document.getElementById('style').value]}

### 文字樣式
${fontMap[document.getElementById('font').value]}

### 格式
- 總張數：16 張 (4×4 排列)
- 每張貼圖尺寸：370×320 px
- 背景：純色或簡單漸層
- 構圖：角色居中，留白適當

### 文字內容
${lines.map((l, i) => `${i + 1}. ${l}`).join('\n')}

### 要求
1. 保持角色一致性（相同臉型、髮型、服裝）
2. 每張表情和動作不同
3. 文字清晰可讀，不遮擋臉部
4. 整體風格統一
5. 適合 LINE 貼圖使用場景

請生成 16 張貼圖。`;

  document.getElementById('resultBox').textContent = prompt;
  document.getElementById('resultSection').classList.remove('hidden');
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
}

function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('resultBox').textContent).then(() => {
    alert('✅ 已複製！');
  });
}

renderScriptPacks();
