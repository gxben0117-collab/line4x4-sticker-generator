<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 貼圖咒語產生器 - 簡化版</title>
<style>
:root {
  --primary: #0071e3;
  --primary-dark: #0058b0;
  --bg: #f5f5f7;
  --surface: #ffffff;
  --text: #1d1d1f;
  --text-muted: #6e6e73;
  --border: #d2d2d7;
  --success: #34c759;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding: 20px;
  min-height: 100vh;
}

.container {
  max-width: 800px;
  margin: 0 auto;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 40px;
  padding: 40px 20px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: var(--radius);
  color: white;
}

.header h1 {
  font-size: 32px;
  margin-bottom: 10px;
  font-weight: 700;
}

.header p {
  font-size: 16px;
  opacity: 0.9;
}

/* Progress Bar */
.progress-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 40px;
  position: relative;
}

.progress-bar::before {
  content: '';
  position: absolute;
  top: 20px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--border);
  z-index: 0;
}

.step {
  flex: 1;
  text-align: center;
  position: relative;
  z-index: 1;
}

.step-circle {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--surface);
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 10px;
  font-weight: 700;
  transition: all 0.3s;
}

.step.active .step-circle {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
  transform: scale(1.1);
}

.step.completed .step-circle {
  background: var(--success);
  border-color: var(--success);
  color: white;
}

.step-label {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 500;
}

.step.active .step-label {
  color: var(--primary);
  font-weight: 600;
}

/* Card */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 40px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}

.card-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--text);
}

.card-subtitle {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 30px;
}

/* Form Elements */
.form-group {
  margin-bottom: 30px;
}

.form-label {
  display: block;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text);
}

.upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 40px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: var(--bg);
}

.upload-area:hover {
  border-color: var(--primary);
  background: rgba(0, 113, 227, 0.05);
}

.upload-icon {
  font-size: 48px;
  margin-bottom: 10px;
}

.upload-text {
  font-size: 16px;
  color: var(--text-muted);
}

.divider {
  text-align: center;
  margin: 30px 0;
  position: relative;
}

.divider::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 1px;
  background: var(--border);
}

.divider-text {
  display: inline-block;
  background: var(--surface);
  padding: 0 20px;
  position: relative;
  color: var(--text-muted);
  font-size: 14px;
}

/* Quick Presets */
.preset-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-bottom: 30px;
}

.preset-card {
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: var(--surface);
}

.preset-card:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(0, 113, 227, 0.15);
}

.preset-card.selected {
  border-color: var(--primary);
  background: rgba(0, 113, 227, 0.05);
}

.preset-icon {
  font-size: 36px;
  margin-bottom: 10px;
}

.preset-name {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 5px;
}

.preset-desc {
  font-size: 12px;
  color: var(--text-muted);
}

/* Input */
textarea {
  width: 100%;
  padding: 15px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-size: 16px;
  font-family: inherit;
  resize: vertical;
  min-height: 100px;
  transition: border-color 0.3s;
}

textarea:focus {
  outline: none;
  border-color: var(--primary);
}

/* Radio Options */
.radio-group {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
}

.radio-option {
  position: relative;
}

.radio-option input {
  position: absolute;
  opacity: 0;
}

.radio-label {
  display: block;
  padding: 15px 20px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 500;
}

.radio-option input:checked + .radio-label {
  border-color: var(--primary);
  background: rgba(0, 113, 227, 0.05);
  color: var(--primary);
  font-weight: 600;
}

.radio-label:hover {
  border-color: var(--primary);
}

/* Buttons */
.btn-group {
  display: flex;
  gap: 15px;
  margin-top: 30px;
}

.btn {
  flex: 1;
  padding: 16px 32px;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
}

.btn-primary {
  background: var(--primary);
  color: white;
  box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0, 113, 227, 0.4);
}

.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 2px solid var(--border);
}

.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
}

/* Result */
.result-box {
  background: #1e1e1e;
  color: #d4d4d4;
  padding: 20px;
  border-radius: var(--radius);
  font-family: 'Consolas', 'Monaco', monospace;
  font-size: 14px;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 500px;
  overflow-y: auto;
  margin-bottom: 20px;
}

.success-message {
  text-align: center;
  padding: 20px;
  background: rgba(52, 199, 89, 0.1);
  border: 2px solid var(--success);
  border-radius: var(--radius);
  margin-bottom: 20px;
}

.success-icon {
  font-size: 48px;
  margin-bottom: 10px;
}

.success-text {
  font-size: 20px;
  font-weight: 600;
  color: var(--success);
}

/* Hidden */
.hidden {
  display: none;
}

/* Mobile */
@media (max-width: 768px) {
  body {
    padding: 10px;
  }

  .header h1 {
    font-size: 24px;
  }

  .card {
    padding: 20px;
  }

  .preset-grid {
    grid-template-columns: 1fr;
  }

  .radio-group {
    grid-template-columns: 1fr;
  }

  .btn-group {
    flex-direction: column;
  }

  .progress-bar {
    flex-direction: column;
    gap: 20px;
  }

  .progress-bar::before {
    display: none;
  }
}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>🎨 LINE 貼圖咒語產生器</h1>
    <p>3 步驟快速生成專業貼圖咒語</p>
  </div>

  <!-- Progress Bar -->
  <div class="progress-bar">
    <div class="step active" id="progress-step1">
      <div class="step-circle">1</div>
      <div class="step-label">設定人物</div>
    </div>
    <div class="step" id="progress-step2">
      <div class="step-circle">2</div>
      <div class="step-label">選擇風格</div>
    </div>
    <div class="step" id="progress-step3">
      <div class="step-circle">3</div>
      <div class="step-label">複製咒語</div>
    </div>
  </div>

  <!-- Step 1: Character -->
  <div class="card" id="step1">
    <h2 class="card-title">📸 步驟 1：設定你的角色</h2>
    <p class="card-subtitle">上傳照片、選擇快速套餐，或手動輸入描述</p>

    <div class="form-group">
      <label class="form-label">上傳人物照片</label>
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📤</div>
        <div class="upload-text">點擊上傳照片（支援 JPG, PNG）</div>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
      </div>
    </div>

    <div class="divider">
      <span class="divider-text">或選擇快速套餐</span>
    </div>

    <div class="preset-grid">
      <div class="preset-card" onclick="selectPreset('daily-girl')">
        <div class="preset-icon">👧</div>
        <div class="preset-name">日常女孩</div>
        <div class="preset-desc">可愛甜美風格</div>
      </div>
      <div class="preset-card" onclick="selectPreset('office-man')">
        <div class="preset-icon">👨‍💼</div>
        <div class="preset-name">職場男性</div>
        <div class="preset-desc">專業穩重風格</div>
      </div>
      <div class="preset-card" onclick="selectPreset('cute-pet')">
        <div class="preset-icon">🐱</div>
        <div class="preset-name">可愛寵物</div>
        <div class="preset-desc">萌系動物風格</div>
      </div>
    </div>

    <div class="divider">
      <span class="divider-text">或手動輸入</span>
    </div>

    <div class="form-group">
      <label class="form-label">角色描述</label>
      <textarea id="characterDesc" placeholder="例如：紅色頭髮的女孩，大眼睛，甜美笑容，穿著休閒服裝..."></textarea>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="nextStep(2)">下一步 →</button>
    </div>
  </div>

  <!-- Step 2: Style -->
  <div class="card hidden" id="step2">
    <h2 class="card-title">🎨 步驟 2：選擇風格設定</h2>
    <p class="card-subtitle">選擇畫風、文字樣式和其他設定</p>

    <div class="form-group">
      <label class="form-label">畫風</label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" name="style" id="style-cute" value="cute" checked>
          <label for="style-cute" class="radio-label">可愛 Q 版</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="style" id="style-realistic" value="realistic">
          <label for="style-realistic" class="radio-label">寫實風格</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="style" id="style-ink" value="ink">
          <label for="style-ink" class="radio-label">水墨手繪</label>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">文字樣式</label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" name="font" id="font-bold" value="bold" checked>
          <label for="font-bold" class="radio-label">粗黑體</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="font" id="font-handwriting" value="handwriting">
          <label for="font-handwriting" class="radio-label">手寫體</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="font" id="font-cute" value="cute">
          <label for="font-cute" class="radio-label">可愛字體</label>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">張數</label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" name="count" id="count-4" value="4">
          <label for="count-4" class="radio-label">4 張 (2×2)</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="count" id="count-16" value="16" checked>
          <label for="count-16" class="radio-label">16 張 (4×4)</label>
        </div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-secondary" onclick="prevStep(1)">← 上一步</button>
      <button class="btn btn-primary" onclick="generatePrompt()">🚀 生成咒語</button>
    </div>
  </div>

  <!-- Step 3: Result -->
  <div class="card hidden" id="step3">
    <div class="success-message">
      <div class="success-icon">✅</div>
      <div class="success-text">咒語已生成！</div>
    </div>

    <h2 class="card-title">📋 你的咒語</h2>
    <p class="card-subtitle">複製下方咒語，貼到 ChatGPT 即可生成貼圖</p>

    <div class="result-box" id="resultBox"></div>

    <div class="btn-group">
      <button class="btn btn-secondary" onclick="resetAll()">← 重新設定</button>
      <button class="btn btn-primary" onclick="copyPrompt()">📋 複製咒語</button>
    </div>
  </div>
</div>

<script>
// State
let currentStep = 1;
let selectedPreset = null;
const state = {
  character: '',
  style: 'cute',
  font: 'bold',
  count: 16
};

// Presets
const presets = {
  'daily-girl': {
    character: '可愛的女孩，大眼睛，甜美笑容，長髮，穿著休閒服裝',
    style: 'cute',
    font: 'handwriting'
  },
  'office-man': {
    character: '專業的男性，西裝，自信表情，短髮，商務風格',
    style: 'realistic',
    font: 'bold'
  },
  'cute-pet': {
    character: '可愛的貓咪，大眼睛，毛茸茸，圓潤身形，萌系風格',
    style: 'cute',
    font: 'cute'
  }
};

// Select Preset
function selectPreset(presetId) {
  // Remove previous selection
  document.querySelectorAll('.preset-card').forEach(card => {
    card.classList.remove('selected');
  });

  // Add selection
  event.target.closest('.preset-card').classList.add('selected');

  // Apply preset
  selectedPreset = presetId;
  const preset = presets[presetId];
  document.getElementById('characterDesc').value = preset.character;

  // Auto fill style
  document.getElementById(`style-${preset.style}`).checked = true;
  document.getElementById(`font-${preset.font}`).checked = true;
}

// Navigation
function nextStep(step) {
  // Validate
  if (step === 2) {
    const charDesc = document.getElementById('characterDesc').value.trim();
    if (!charDesc && !selectedPreset) {
      alert('請上傳照片、選擇快速套餐，或輸入角色描述');
      return;
    }
    state.character = charDesc;
  }

  // Hide current
  document.getElementById(`step${currentStep}`).classList.add('hidden');
  document.getElementById(`progress-step${currentStep}`).classList.remove('active');
  document.getElementById(`progress-step${currentStep}`).classList.add('completed');

  // Show next
  currentStep = step;
  document.getElementById(`step${step}`).classList.remove('hidden');
  document.getElementById(`progress-step${step}`).classList.add('active');

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevStep(step) {
  // Hide current
  document.getElementById(`step${currentStep}`).classList.add('hidden');
  document.getElementById(`progress-step${currentStep}`).classList.remove('active');

  // Show previous
  currentStep = step;
  document.getElementById(`step${step}`).classList.remove('hidden');
  document.getElementById(`progress-step${step}`).classList.add('active');
  document.getElementById(`progress-step${step}`).classList.remove('completed');

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Generate Prompt
function generatePrompt() {
  // Get values
  state.style = document.querySelector('input[name="style"]:checked').value;
  state.font = document.querySelector('input[name="font"]:checked').value;
  state.count = document.querySelector('input[name="count"]:checked').value;

  // Build prompt
  const styleMap = {
    'cute': 'Q 版可愛風格，大眼睛，圓潤身形，柔和線條',
    'realistic': '寫實風格，自然比例，細緻五官，真實光影',
    'ink': '水墨手繪風格，手繪塗鴉質感，水墨濺色，粉彩暈染'
  };

  const fontMap = {
    'bold': '粗黑體，清晰易讀，筆畫粗壯',
    'handwriting': '手寫體，自然筆觸，溫暖親切',
    'cute': '可愛字體，圓潤筆畫，活潑俏皮'
  };

  const prompt = `## LINE 貼圖生成咒語

### 角色設定
${state.character}

### 畫風
${styleMap[state.style]}

### 文字樣式
${fontMap[state.font]}

### 格式
- 總張數：${state.count} 張 (${state.count === '4' ? '2×2' : '4×4'} 排列)
- 每張貼圖尺寸：370×320 px
- 背景：純色或簡單漸層
- 構圖：角色居中，留白適當

### 文字內容
請為每張貼圖配上適合的繁體中文短語，例如：
早安、晚安、謝謝、加油、辛苦了、好的、收到、了解、OK、哈哈、哭哭、生氣、愛你、想你、掰掰、晚點聊

### 要求
1. 保持角色一致性（相同臉型、髮型、服裝）
2. 每張表情和動作不同
3. 文字清晰可讀，不遮擋臉部
4. 整體風格統一
5. 適合 LINE 貼圖使用場景

請生成 ${state.count} 張貼圖。`;

  // Show result
  document.getElementById('resultBox').textContent = prompt;
  nextStep(3);
}

// Copy Prompt
function copyPrompt() {
  const text = document.getElementById('resultBox').textContent;
  navigator.clipboard.writeText(text).then(() => {
    alert('✅ 咒語已複製到剪貼簿！');
  }).catch(() => {
    alert('❌ 複製失敗，請手動選取複製');
  });
}

// Reset
function resetAll() {
  currentStep = 1;
  selectedPreset = null;

  // Reset form
  document.getElementById('characterDesc').value = '';
  document.getElementById('style-cute').checked = true;
  document.getElementById('font-bold').checked = true;
  document.getElementById('count-16').checked = true;

  // Reset UI
  document.querySelectorAll('.preset-card').forEach(card => {
    card.classList.remove('selected');
  });

  // Show step 1
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step3').classList.add('hidden');

  // Reset progress
  document.querySelectorAll('.step').forEach((step, index) => {
    step.classList.remove('active', 'completed');
    if (index === 0) step.classList.add('active');
  });

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

</body>
</html>
